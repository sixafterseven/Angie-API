name: Deploy Cloud Functions

# App Hosting auto-deploys the web/ frontend on every push to main, but nothing
# deploys the Cloud Functions in functions/. This workflow closes that gap: when
# a change under functions/ lands on main, it runs the same checks required
# before commit (lint, build, test) and then deploys the functions.
#
# Auth: keyless, via Workload Identity Federation (no service-account key file).
# See .github/workflows/README-deploy.md for the one-time GCP setup.

on:
  push:
    branches: [main]
    paths:
      - "functions/**"
      - ".github/workflows/deploy-functions.yml"
  # Allows a manual run from the Actions tab if a deploy needs to be re-triggered.
  workflow_dispatch:

# Never let two function deploys run at once; cancel an in-progress one if a
# newer commit lands.
concurrency:
  group: deploy-functions
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required so the job can mint an OIDC token for Workload Identity Federation.
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        working-directory: functions
        run: npm ci

      - name: Lint
        working-directory: functions
        run: npm run lint

      - name: Build
        working-directory: functions
        run: npm run build

      - name: Test
        working-directory: functions
        run: npm test

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: micah-amari-angie-os
          workload_identity_provider: projects/243784491046/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-functions-deployer@micah-amari-angie-os.iam.gserviceaccount.com

      - name: Deploy functions
        working-directory: functions
        run: >-
          npx firebase-tools@latest deploy
          --only functions
          --project micah-amari-angie-os
          --non-interactive
          --force
